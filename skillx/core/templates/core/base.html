<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SkillX{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3d;
    --accent: #7c6af7; --accent2: #f7936a; --accent3: #4af0b8;
    --text: #e8e8f0; --muted: #7a7a9a; --danger: #f75a5a; --success: #4af0b8;
    --radius: 12px;
    --mono: 'DM Mono', monospace; --serif: 'DM Serif Display', serif; --sans: 'Outfit', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    font-size: 15px; line-height: 1.6; min-height: 100vh;
    background-image: radial-gradient(ellipse 80% 50% at 20% -10%, rgba(124,106,247,0.12) 0%, transparent 60%),
                      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(74,240,184,0.06) 0%, transparent 50%);
  }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.88); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px;
  }
  .nav-brand { font-family: var(--serif); font-size: 1.4rem; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .nav-brand span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 4px; }
  .nav-links a { color: var(--muted); text-decoration: none; padding: 6px 14px; border-radius: 8px; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
  .nav-links a:hover { color: var(--text); background: var(--surface2); }
  .nav-pill { background: var(--accent) !important; color: #fff !important; padding: 6px 16px !important; }
  .nav-live { background: rgba(247,90,90,0.15) !important; color: #f75a5a !important; border: 1px solid rgba(247,90,90,0.3) !important; display: inline-flex; align-items: center; gap: 5px; }
  .nav-live-dot { width: 6px; height: 6px; border-radius: 50%; background: #f75a5a; animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
  h1 { font-family: var(--serif); font-size: clamp(2rem,5vw,3rem); line-height: 1.1; }
  h2 { font-family: var(--serif); font-size: 1.75rem; }
  h3 { font-family: var(--sans); font-size: 1.1rem; font-weight: 600; }
  .mono { font-family: var(--mono); } .muted { color: var(--muted); }
  .form-group { margin-bottom: 1.25rem; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .form-input, input[type=text], input[type=email], input[type=password], textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 8px;
    font-family: var(--sans); font-size: 0.95rem; transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }
  .form-input:focus, input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,247,0.15); }
  textarea { resize: vertical; min-height: 80px; }
  .errorlist { list-style: none; margin-top: 4px; }
  .errorlist li { color: var(--danger); font-size: 0.8rem; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; border: none; border-radius: 8px; font-family: var(--sans); font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6a58e0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,106,247,0.35); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge-purple { background: rgba(124,106,247,0.15); color: var(--accent); border: 1px solid rgba(124,106,247,0.25); }
  .badge-orange { background: rgba(247,147,106,0.15); color: var(--accent2); border: 1px solid rgba(247,147,106,0.25); }
  .badge-green { background: rgba(74,240,184,0.12); color: var(--accent3); border: 1px solid rgba(74,240,184,0.2); }
  .messages-list { list-style: none; margin-bottom: 1rem; }
  .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; font-size: 0.875rem; border-left: 3px solid; }
  .alert-success { background: rgba(74,240,184,0.08); border-color: var(--success); color: var(--success); }
  .alert-error { background: rgba(247,90,90,0.08); border-color: var(--danger); color: var(--danger); }
  .alert-warning { background: rgba(247,147,106,0.08); border-color: var(--accent2); color: var(--accent2); }
  .alert-info { background: rgba(124,106,247,0.08); border-color: var(--accent); color: var(--accent); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .skill-tag { font-family: var(--mono); font-size: 0.75rem; padding: 3px 10px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .skill-tag.have { color: var(--accent3); border-color: rgba(74,240,184,0.25); background: rgba(74,240,184,0.06); }
  .skill-tag.want { color: var(--accent2); border-color: rgba(247,147,106,0.25); background: rgba(247,147,106,0.06); }
  .skill-tag.match { color: var(--accent); border-color: rgba(124,106,247,0.3); background: rgba(124,106,247,0.1); }
  .flex { display: flex; } .flex-center { display: flex; align-items: center; } .justify-between { justify-content: space-between; }
  .gap-2 { gap: 0.5rem; } .gap-3 { gap: 0.75rem; } .gap-4 { gap: 1rem; }
  .mt-2 { margin-top: 0.5rem; } .mt-4 { margin-top: 1rem; } .mb-4 { margin-bottom: 1rem; }
  .text-center { text-align: center; } .w-full { width: 100%; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; color: #fff; flex-shrink: 0; }
  .avatar-lg { width: 56px; height: 56px; font-size: 1.2rem; }
  @media (max-width: 600px) { .container { padding: 1rem; } nav { padding: 0 1rem; } .nav-links a { padding: 6px 8px; font-size: 0.78rem; } }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

<nav>
  <a href="{% url 'home' %}" class="nav-brand">Skill<span>X</span></a>
  <div class="nav-links">
    {% if user.is_authenticated %}
      <a href="{% url 'live_lobby' %}" class="nav-live"><span class="nav-live-dot"></span>Go Live</a>
      <a href="{% url 'find_match' %}">Browse</a>
      <a href="{% url 'my_matches' %}">Matches</a>
      <a href="{% url 'edit_profile' %}">Profile</a>
      <a href="{% url 'logout' %}" class="btn btn-ghost btn-sm">Logout</a>
    {% else %}
      <a href="{% url 'login' %}">Login</a>
      <a href="{% url 'signup' %}" class="nav-pill">Join Free</a>
    {% endif %}
  </div>
</nav>

<main>
  {% if messages %}
    <div class="container" style="padding-bottom:0">
      <ul class="messages-list">
        {% for message in messages %}
          <li class="alert alert-{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    </div>
  {% endif %}
  {% block content %}{% endblock %}
</main>

</body>
</html>
