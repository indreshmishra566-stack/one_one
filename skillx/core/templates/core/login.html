{% extends 'core/base.html' %}
{% block title %}Sign In — SkillX{% endblock %}
{% block extra_css %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 60px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }
  .auth-card { width: 100%; max-width: 420px; }
  .auth-header { text-align: center; margin-bottom: 2rem; }
  .auth-header h1 { font-size: 2rem; margin-bottom: 6px; }
  .auth-header p { color: var(--muted); }
  .auth-footer { text-align: center; margin-top: 1.25rem; color: var(--muted); font-size: 0.875rem; }
  .auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your SkillX account</p>
    </div>
    <div class="card">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-full mt-2" style="justify-content:center;">Sign In</button>
      </form>
    </div>
    <div class="auth-footer">Don't have an account? <a href="{% url 'signup' %}">Join free</a></div>
  </div>
</div>
{% endblock %}
